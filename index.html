<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Exos Maths</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #2d3748, #4a5568);
    color: white; padding: 20px 32px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header span { font-size: 1.8rem; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .stats-bar {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat {
    background: white; border-radius: 10px; padding: 14px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); flex: 1; min-width: 130px;
    text-align: center;
  }
  .stat .num { font-size: 1.8rem; font-weight: 700; color: #4299e1; }
  .stat .label { font-size: 0.78rem; color: #718096; margin-top: 2px; }

  .card {
    background: white; border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px;
  }
  .card h2 { font-size: 1rem; font-weight: 600; color: #2d3748; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full { grid-column: 1 / -1; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: #4a5568; margin-bottom: 4px; }
  input[type=text], input[type=date], textarea, select {
    width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0;
    border-radius: 8px; font-size: 0.92rem; font-family: inherit;
    transition: border 0.15s; outline: none; background: #f7fafc;
  }
  input:focus, textarea:focus, select:focus { border-color: #4299e1; background: white; }
  textarea { resize: vertical; min-height: 80px; }

  .photo-upload {
    border: 2px dashed #cbd5e0; border-radius: 8px; padding: 20px;
    text-align: center; cursor: pointer; transition: all 0.15s; background: #f7fafc;
  }
  .photo-upload:hover { border-color: #4299e1; background: #ebf8ff; }
  .photo-upload input { display: none; }
  .photo-upload .icon { font-size: 1.8rem; }
  .photo-upload p { font-size: 0.82rem; color: #718096; margin-top: 6px; }
  #photo-preview { max-width: 100%; max-height: 180px; border-radius: 8px; margin-top: 10px; display: none; }

  .btn {
    padding: 10px 22px; border: none; border-radius: 8px; font-size: 0.92rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: #4299e1; color: white; }
  .btn-primary:hover { background: #3182ce; }
  .btn-danger { background: #fc8181; color: white; font-size: 0.78rem; padding: 5px 10px; }
  .btn-danger:hover { background: #e53e3e; }
  .btn-sm { padding: 6px 14px; font-size: 0.82rem; }

  .search-bar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
  }
  .search-bar > div { flex: 1; min-width: 140px; }
  .search-bar input, .search-bar select { background: #f7fafc; }

  .exo-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .exo-item {
    border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 14px 16px;
    cursor: pointer; transition: all 0.15s; background: white;
    display: flex; align-items: center; gap: 14px;
  }
  .exo-item:hover { border-color: #4299e1; box-shadow: 0 2px 8px rgba(66,153,225,0.12); }
  .exo-num {
    background: #ebf8ff; color: #2b6cb0; font-weight: 700; font-size: 1rem;
    border-radius: 8px; padding: 8px 14px; min-width: 60px; text-align: center;
    white-space: nowrap;
  }
  .exo-info { flex: 1; }
  .exo-info .title { font-weight: 600; font-size: 0.95rem; }
  .exo-info .meta { font-size: 0.78rem; color: #718096; margin-top: 3px; }
  .exo-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
  .tag {
    font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; font-weight: 500;
    background: #f0fff4; color: #276749; border: 1px solid #c6f6d5;
  }
  .tag.source { background: #faf5ff; color: #553c9a; border-color: #e9d8fd; }
  .exo-actions { display: flex; gap: 6px; }
  .has-photo { color: #38a169; font-size: 0.8rem; font-weight: 500; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 100;
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 14px; max-width: 600px; width: 100%;
    max-height: 90vh; overflow-y: auto; padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; color: #2d3748; }
  .modal-field { margin-bottom: 14px; }
  .modal-field .field-label { font-size: 0.78rem; font-weight: 600; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; }
  .modal-field .field-value { font-size: 0.95rem; margin-top: 3px; color: #1a202c; white-space: pre-wrap; }
  .modal img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-secondary { background: #edf2f7; color: #4a5568; }
  .btn-secondary:hover { background: #e2e8f0; }

  .empty { text-align: center; padding: 40px; color: #a0aec0; }
  .empty .icon { font-size: 3rem; }
  .empty p { margin-top: 10px; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .search-bar > div { min-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <span>📐</span>
  <h1>Suivi Exercices Maths</h1>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <div class="num" id="stat-total">0</div>
      <div class="label">Exos faits</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-chapters">0</div>
      <div class="label">Chapitres</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-sources">0</div>
      <div class="label">Sources</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-photos">0</div>
      <div class="label">Avec photo</div>
    </div>
  </div>

  <!-- Formulaire ajout -->
  <div class="card">
    <h2>➕ Ajouter un exercice</h2>
    <form id="add-form">
      <div class="form-grid">
        <div>
          <label>Numéro d'exercice *</label>
          <input type="text" id="f-num" placeholder="ex: 42, B3, 7.12" required>
        </div>
        <div>
          <label>Date *</label>
          <input type="date" id="f-date" required>
        </div>
        <div>
          <label>Source / Livre</label>
          <input type="text" id="f-source" placeholder="ex: Barbazo, Fiche DS..." list="sources-list">
          <datalist id="sources-list"></datalist>
        </div>
        <div>
          <label>Chapitre</label>
          <input type="text" id="f-chapter" placeholder="ex: Suites, Dérivation..." list="chapters-list">
          <datalist id="chapters-list"></datalist>
        </div>
        <div>
          <label>Difficulté</label>
          <select id="f-diff">
            <option value="">— Non renseignée —</option>
            <option value="⭐ Facile">⭐ Facile</option>
            <option value="⭐⭐ Moyen">⭐⭐ Moyen</option>
            <option value="⭐⭐⭐ Difficile">⭐⭐⭐ Difficile</option>
          </select>
        </div>
        <div>
          <label>Résultat</label>
          <select id="f-result">
            <option value="">— Non renseigné —</option>
            <option value="✅ Réussi">✅ Réussi</option>
            <option value="⚠️ Partiellement">⚠️ Partiellement</option>
            <option value="❌ Échoué">❌ Échoué</option>
          </select>
        </div>
        <div class="full">
          <label>Notes / Remarques</label>
          <textarea id="f-notes" placeholder="Méthode utilisée, erreurs à éviter, points importants..."></textarea>
        </div>
        <div class="full">
          <label>Photo de la résolution</label>
          <div class="photo-upload" onclick="document.getElementById('f-photo').click()">
            <input type="file" id="f-photo" accept="image/*" onchange="previewPhoto(this)">
            <div class="icon">📷</div>
            <p>Clique pour ajouter une photo (ou glisse une image)</p>
            <img id="photo-preview" alt="Aperçu">
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px;gap:10px;">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Annuler</button>
        <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
      </div>
    </form>
  </div>

  <!-- Liste & Recherche -->
  <div class="card">
    <h2>📋 Mes exercices</h2>
    <div class="search-bar">
      <div>
        <label>Recherche</label>
        <input type="text" id="s-query" placeholder="Numéro, notes..." oninput="renderList()">
      </div>
      <div>
        <label>Chapitre</label>
        <select id="s-chapter" onchange="renderList()">
          <option value="">Tous</option>
        </select>
      </div>
      <div>
        <label>Source</label>
        <select id="s-source" onchange="renderList()">
          <option value="">Toutes</option>
        </select>
      </div>
      <div>
        <label>Résultat</label>
        <select id="s-result" onchange="renderList()">
          <option value="">Tous</option>
          <option value="✅ Réussi">✅ Réussi</option>
          <option value="⚠️ Partiellement">⚠️ Partiellement</option>
          <option value="❌ Échoué">❌ Échoué</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button class="btn btn-secondary btn-sm" onclick="clearSearch()">🔄 Reset</button>
      </div>
    </div>
    <div class="exo-list" id="exo-list"></div>
  </div>

</div>

<!-- Modal détail -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="modal-delete">🗑 Supprimer</button>
      <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'suivi_exos_maths';
let exos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentId = null;

// Init date du jour
document.getElementById('f-date').valueAsDate = new Date();

// ─── SAVE / LOAD ─────────────────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(exos));
}

// ─── FORM ────────────────────────────────────────────────────
document.getElementById('add-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const num = document.getElementById('f-num').value.trim();
  const date = document.getElementById('f-date').value;
  const source = document.getElementById('f-source').value.trim();
  const chapter = document.getElementById('f-chapter').value.trim();
  const diff = document.getElementById('f-diff').value;
  const result = document.getElementById('f-result').value;
  const notes = document.getElementById('f-notes').value.trim();
  const photoFile = document.getElementById('f-photo').files[0];

  let photo = null;
  if (photoFile) {
    photo = await toBase64(photoFile);
  }

  exos.unshift({
    id: Date.now(),
    num, date, source, chapter, diff, result, notes, photo
  });
  save();
  resetForm();
  updateAll();
});

function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      // Resize to max 1200px to save space
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 1200;
        let w = img.width, h = img.height;
        if (w > max) { h = h * max / w; w = max; }
        if (h > max) { w = w * max / h; h = max; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('photo-preview');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function resetForm() {
  document.getElementById('add-form').reset();
  document.getElementById('f-date').valueAsDate = new Date();
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-preview').src = '';
}

// ─── RENDER ──────────────────────────────────────────────────
function updateAll() {
  updateStats();
  updateFilters();
  renderList();
}

function updateStats() {
  document.getElementById('stat-total').textContent = exos.length;
  document.getElementById('stat-chapters').textContent = new Set(exos.map(e => e.chapter).filter(Boolean)).size;
  document.getElementById('stat-sources').textContent = new Set(exos.map(e => e.source).filter(Boolean)).size;
  document.getElementById('stat-photos').textContent = exos.filter(e => e.photo).length;
}

function updateFilters() {
  const chapters = [...new Set(exos.map(e => e.chapter).filter(Boolean))].sort();
  const sources = [...new Set(exos.map(e => e.source).filter(Boolean))].sort();

  // Dropdowns recherche
  const sc = document.getElementById('s-chapter');
  const ss = document.getElementById('s-source');
  const scVal = sc.value, ssVal = ss.value;
  sc.innerHTML = '<option value="">Tous</option>' + chapters.map(c => `<option>${c}</option>`).join('');
  ss.innerHTML = '<option value="">Toutes</option>' + sources.map(s => `<option>${s}</option>`).join('');
  sc.value = scVal; ss.value = ssVal;

  // Datalists formulaire
  document.getElementById('chapters-list').innerHTML = chapters.map(c => `<option value="${c}">`).join('');
  document.getElementById('sources-list').innerHTML = sources.map(s => `<option value="${s}">`).join('');
}

function renderList() {
  const query = document.getElementById('s-query').value.toLowerCase();
  const chapter = document.getElementById('s-chapter').value;
  const source = document.getElementById('s-source').value;
  const result = document.getElementById('s-result').value;

  let filtered = exos.filter(e => {
    if (chapter && e.chapter !== chapter) return false;
    if (source && e.source !== source) return false;
    if (result && e.result !== result) return false;
    if (query) {
      const hay = [e.num, e.chapter, e.source, e.notes, e.diff, e.result].join(' ').toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });

  const list = document.getElementById('exo-list');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="icon">📭</div><p>${exos.length === 0 ? 'Aucun exercice enregistré pour l\'instant.' : 'Aucun résultat pour ces filtres.'}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(e => `
    <div class="exo-item" onclick="openModal(${e.id})">
      <div class="exo-num">Exo ${escHtml(e.num)}</div>
      <div class="exo-info">
        <div class="title">${[e.chapter, e.source].filter(Boolean).join(' · ') || '<span style="color:#a0aec0">Sans titre</span>'}</div>
        <div class="meta">${formatDate(e.date)}${e.diff ? ' · ' + e.diff : ''}${e.result ? ' · ' + e.result : ''}</div>
        ${e.notes ? `<div class="meta" style="margin-top:4px;color:#4a5568">${escHtml(e.notes.slice(0, 80))}${e.notes.length > 80 ? '…' : ''}</div>` : ''}
        <div class="exo-tags">
          ${e.chapter ? `<span class="tag">${escHtml(e.chapter)}</span>` : ''}
          ${e.source ? `<span class="tag source">${escHtml(e.source)}</span>` : ''}
          ${e.photo ? `<span class="has-photo">📷 Photo</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

// ─── MODAL ───────────────────────────────────────────────────
function openModal(id) {
  const e = exos.find(x => x.id === id);
  if (!e) return;
  currentId = id;

  document.getElementById('modal-title').textContent = `Exercice n°${e.num}`;
  document.getElementById('modal-body').innerHTML = `
    ${field('Source', e.source)}
    ${field('Chapitre', e.chapter)}
    ${field('Date', formatDate(e.date))}
    ${field('Difficulté', e.diff)}
    ${field('Résultat', e.result)}
    ${field('Notes', e.notes)}
    ${e.photo ? `<div class="modal-field"><div class="field-label">Photo</div><img src="${e.photo}" alt="Résolution"></div>` : ''}
  `;

  document.getElementById('modal-delete').onclick = () => deleteExo(id);
  document.getElementById('modal-overlay').classList.add('active');
}

function field(label, value) {
  if (!value) return '';
  return `<div class="modal-field">
    <div class="field-label">${label}</div>
    <div class="field-value">${escHtml(value)}</div>
  </div>`;
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('active');
    currentId = null;
  }
}

function deleteExo(id) {
  if (!confirm('Supprimer cet exercice ?')) return;
  exos = exos.filter(e => e.id !== id);
  save();
  closeModal();
  updateAll();
}

// ─── HELPERS ─────────────────────────────────────────────────
function clearSearch() {
  document.getElementById('s-query').value = '';
  document.getElementById('s-chapter').value = '';
  document.getElementById('s-source').value = '';
  document.getElementById('s-result').value = '';
  renderList();
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────
updateAll();
</script>
</body>
</html>
